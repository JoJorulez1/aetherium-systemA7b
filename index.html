<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHERIUM | System OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --neon: #00f2ff;
            --neon-dim: rgba(0, 242, 255, 0.15);
            --neon-glow: 0 0 20px rgba(0, 242, 255, 0.4);
            --gm: #a855f7;
            --gm-dim: rgba(168, 85, 247, 0.15);
            --bg: #020617;
            --panel: #050d1a;
            --border: rgba(0, 242, 255, 0.12);
            --border-gm: rgba(168, 85, 247, 0.2);
            --text: #7a9ab8;
            --text-bright: #c8dff0;
            --red: #ef4444;
            --yellow: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* Scanline Overlay */
        body::after {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .frame {
            width: 95%;
            max-width: 460px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-top: 3px solid var(--neon);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            z-index: 1;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        /* UI Elements */
        .label { font-size: 0.65rem; color: var(--neon); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 6px; }
        .bar-bg { background: rgba(0,0,0,0.6); height: 8px; border-radius: 4px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 4px; }
        #bar-ap { background: linear-gradient(90deg, #dc2626, #ef4444); box-shadow: 0 0 10px rgba(239,68,68,0.3); }
        #bar-xp { background: linear-gradient(90deg, #b45309, #f59e0b); box-shadow: 0 0 10px rgba(245,158,11,0.3); }

        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .tab { font-size: 0.7rem; color: var(--text); cursor: pointer; text-transform: uppercase; font-weight: 600; letter-spacing: 1.2px; padding: 12px; transition: 0.3s; position: relative; flex: 1; text-align: center; }
        .tab.active { color: var(--neon); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--neon); box-shadow: var(--neon-glow); }

        /* Quest Cards */
        .quest-card {
            background: rgba(0, 242, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid var(--neon);
        }
        .quest-card.hard { border-left-color: var(--red); }
        .quest-card.evolution { border-left-color: var(--gm); }
        .quest-title { font-family: 'Cinzel'; font-size: 0.85rem; color: var(--text-bright); margin-bottom: 4px; }
        .quest-desc { font-size: 0.75rem; color: var(--text); line-height: 1.4; margin-bottom: 8px; }
        .quest-rew { font-size: 0.65rem; color: var(--yellow); letter-spacing: 1px; font-weight: 700; }

        /* Power Slots */
        .power-slot {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .power-slot.sealed { border-style: dashed; opacity: 0.5; background: rgba(0,0,0,0.4); }
        .power-name { font-size: 0.9rem; color: var(--text-bright); font-weight: 600; }
        .power-meta { font-size: 0.6rem; color: var(--neon); text-transform: uppercase; }
        .seal-tag { font-size: 0.55rem; color: var(--red); border: 1px solid var(--red); padding: 2px 6px; border-radius: 4px; font-weight: 800; }

        input, textarea, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 12px; color: white; border-radius: 8px; margin-bottom: 10px; font-family: 'Rajdhani'; }
        .btn { width: 100%; background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 14px; font-weight: 700; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-gm { border-color: var(--gm); color: var(--gm); }
        
        .hidden { display: none !important; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--panel); border: 1px solid var(--neon); padding: 12px 25px; border-radius: 50px; z-index: 1000; transition: 0.5s; color: var(--neon); font-size: 0.8rem; font-weight: 700; box-shadow: var(--neon-glow); }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast">SYSTEM: <span id="toast-msg"></span></div>

<div class="frame">
    <!-- AUTHENTICATION SCREEN -->
    <div id="auth">
        <h1 style="font-family:'Cinzel'; text-align:center; letter-spacing:6px; color:var(--neon); margin-top:20px;">AETHERIUM</h1>
        <p style="text-align:center; font-size:0.6rem; letter-spacing:3px; margin-bottom:40px; color:var(--text);">UNIT SYNCHRONIZATION</p>
        <input id="user-id" type="text" placeholder="UNIT ID (e.g. Jojo)" style="text-align:center;">
        <button class="btn" onclick="sync()">Initialize Link</button>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dash" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <div>
                <div style="font-size:0.5rem; color:var(--neon); letter-spacing:2px;">LINKED UNIT</div>
                <div id="disp-name" style="font-family:'Cinzel'; font-size:1.1rem; color:var(--text-bright);">UNKNOWN</div>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--red); font-size:0.6rem; cursor:pointer; font-weight:bold;">[DISCONNECT]</button>
        </div>

        <div class="tabs">
            <div class="tab active" id="t-status" onclick="switchTab('status')">Stats</div>
            <div class="tab" id="t-directives" onclick="switchTab('directives')">Directives</div>
            <div class="tab" id="t-powers" onclick="switchTab('powers')">Library</div>
        </div>

        <div id="view-status">
            <div class="label">Action Points <span id="ap-val" style="float:right;">--/--</span></div>
            <div class="bar-bg"><div id="bar-ap" class="bar-fill"></div></div>
            
            <div class="label" style="margin-top:15px;">Experience <span id="xp-val" style="float:right;">--/--</span></div>
            <div class="bar-bg"><div id="bar-xp" class="bar-fill"></div></div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                <div style="background:rgba(0,0,0,0.4); padding:15px; border-radius:10px; text-align:center; border:1px solid var(--border);">
                    <div class="label">Evolution Lvl</div>
                    <div id="disp-lvl" style="font-size:1.8rem; font-family:'Cinzel'; color:var(--neon);">1</div>
                </div>
                <div style="background:rgba(0,0,0,0.4); padding:15px; border-radius:10px; text-align:center; border:1px solid var(--border);">
                    <div class="label">A-Coins</div>
                    <div id="disp-coins" style="font-size:1.8rem; font-family:'Cinzel'; color:var(--yellow);">0</div>
                </div>
            </div>
        </div>

        <div id="view-directives" class="hidden">
            <div id="quest-list"></div>
        </div>

        <div id="view-powers" class="hidden">
            <div id="powers-container"></div>
        </div>
    </div>

    <!-- GM ACCESS ROOT -->
    <div id="gm" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:2000; padding:25px; overflow-y:auto;">
        <h2 style="font-family:'Cinzel'; color:var(--gm); margin-bottom:20px;">SYSTEM ARCHITECT</h2>
        
        <div style="background:var(--panel); border:1px solid var(--border-gm); padding:15px; border-radius:10px; margin-bottom:15px;">
            <div class="label" style="color:var(--gm);">Issue Directive</div>
            <input id="q-title" placeholder="Quest Title">
            <textarea id="q-desc" placeholder="Quest Details"></textarea>
            <input id="q-rew" placeholder="Rewards (XP/Coins)">
            <select id="q-diff">
                <option value="normal">Normal</option>
                <option value="hard">Hard</option>
                <option value="evolution">Evolution</option>
            </select>
            <button class="btn btn-gm" onclick="addQuest()">Broadcast</button>
        </div>

        <div style="background:var(--panel); border:1px solid var(--border-gm); padding:15px; border-radius:10px; margin-bottom:15px;">
            <div class="label" style="color:var(--gm);">Dispense Rewards</div>
            <input id="rew-id" placeholder="Unit ID">
            <input id="rew-xp" type="number" placeholder="+ XP">
            <input id="rew-coins" type="number" placeholder="+ Coins">
            <button class="btn btn-gm" onclick="dispenseRewards()">Confirm Registry</button>
        </div>

        <button class="btn" style="margin-top:20px; border-color:#334155; color:#334155;" onclick="document.getElementById('gm').classList.add('hidden')">Exit Terminal</button>
    </div>

    <div style="text-align:center; margin-top:30px; font-size:0.5rem; color:#1e293b; cursor:pointer;" onclick="enterGM()">[ACCESS_ROOT]</div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyDzoLb_qVYgsWAmIdPtdkSJSnXX-IyeQC0",
        databaseURL: "https://aetheriumsystem-f9a6c-default-rtdb.firebaseio.com",
        projectId: "aetheriumsystem-f9a6c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentID = "";

    function toast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    // --- CORE SYNC LOGIC ---
    function sync() {
        const idField = document.getElementById('user-id');
        const id = idField.value.trim().toLowerCase();
        if (!id) return;
        currentID = id;

        toast("INITIALIZING LINK...");

        db.ref('players/' + id).once('value').then(snap => {
            if (snap.exists()) {
                // FORCE UI SWAP
                document.getElementById('auth').style.display = 'none';
                document.getElementById('dash').classList.remove('hidden');
                document.getElementById('dash').style.display = 'block';
                
                updateUI(snap.val());
                toast("SYSTEM ONLINE: Unit " + id.toUpperCase() + " has successfully linked.");
            } else {
                // Create New Unit Registry
                db.ref('players/' + id).set({
                    lvl: 1, exp: 0, coins: 0, ap: 100, maxAp: 100,
                    powers: [
                        { name: "Slot 1 Power", stage: "Basic", sealed: false },
                        { name: "Slot 2 Power", stage: "Basic", sealed: false },
                        { name: "Sealed Power 3", stage: "Sealed", sealed: true },
                        { name: "Sealed Power 4", stage: "Sealed", sealed: true }
                    ]
                }).then(() => location.reload());
            }
        });

        // Real-time listener
        db.ref('players/' + id).on('value', snap => {
            if (snap.exists()) updateUI(snap.val());
        });

        // Quest Sync
        db.ref('worldData/quests').on('value', snap => {
            const container = document.getElementById('quest-list');
            container.innerHTML = '';
            if (!snap.exists()) return;
            snap.forEach(q => {
                const data = q.val();
                container.innerHTML += `
                    <div class="quest-card ${data.diff}">
                        <div class="quest-title">${data.title}</div>
                        <div class="quest-desc">${data.desc}</div>
                        <div class="quest-rew">AWARD: ${data.reward}</div>
                        <button onclick="deleteQuest('${q.key}')" class="btn btn-gm" style="margin-top:10px; padding:4px; font-size:0.5rem; width:auto;">Clear</button>
                    </div>`;
            });
        });
    }

    function updateUI(data) {
        try {
            document.getElementById('disp-name').innerText = currentID.toUpperCase();
            document.getElementById('disp-lvl').innerText = data.lvl || 1;
            document.getElementById('disp-coins').innerText = data.coins || 0;
            
            const ap = data.ap || 100;
            const maxAp = data.maxAp || 100;
            document.getElementById('bar-ap').style.width = (ap / maxAp * 100) + "%";
            document.getElementById('ap-val').innerText = ap + "/" + maxAp;

            const req = Math.floor(100 * Math.pow(1.2, (data.lvl || 1) - 1));
            const exp = data.exp || 0;
            document.getElementById('bar-xp').style.width = (exp / req * 100) + "%";
            document.getElementById('xp-val').innerText = Math.floor(exp) + "/" + req;

            const pContainer = document.getElementById('powers-container');
            if (pContainer && data.powers) {
                pContainer.innerHTML = '';
                data.powers.forEach(p => {
                    pContainer.innerHTML += `
                        <div class="power-slot ${p.sealed ? 'sealed' : ''}">
                            <div>
                                <div class="power-meta">${p.stage}</div>
                                <div class="power-name">${p.name}</div>
                            </div>
                            ${p.sealed ? '<div class="seal-tag">SEALED</div>' : ''}
                        </div>`;
                });
            }
        } catch (e) { console.log("UI Sync Error:", e); }
    }

    function addQuest() {
        const title = document.getElementById('q-title').value;
        const desc = document.getElementById('q-desc').value;
        const reward = document.getElementById('q-rew').value;
        const diff = document.getElementById('q-diff').value;
        if (title) db.ref('worldData/quests').push({ title, desc, reward, diff });
    }

    function deleteQuest(key) { db.ref('worldData/quests/' + key).remove(); }

    function dispenseRewards() {
        const id = document.getElementById('rew-id').value.toLowerCase();
        const xp = parseInt(document.getElementById('rew-xp').value) || 0;
        const coins = parseInt(document.getElementById('rew-coins').value) || 0;
        db.ref('players/' + id).transaction(p => {
            if (p) {
                p.exp += xp;
                p.coins += coins;
                let req = Math.floor(100 * Math.pow(1.2, p.lvl - 1));
                while (p.exp >= req) { p.exp -= req; p.lvl++; req = Math.floor(100 * Math.pow(1.2, p.lvl - 1)); }
            }
            return p;
        });
        toast("REGISTRY UPDATED");
    }

    function switchTab(tab) {
        ['status', 'directives', 'powers'].forEach(t => {
            document.getElementById('view-' + t).classList.toggle('hidden', t !== tab);
            document.getElementById('t-' + t).classList.toggle('active', t === tab);
        });
    }

    function enterGM() { if (prompt("SYSTEM KEY:") === "1234") document.getElementById('gm').classList.remove('hidden'); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AETHERIUM | System OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --neon: #00f2ff;
            --neon-dim: rgba(0, 242, 255, 0.15);
            --neon-glow: 0 0 20px rgba(0, 242, 255, 0.4);
            --gm: #a855f7;
            --bg: #020617;
            --panel: #050d1a;
            --border: rgba(0, 242, 255, 0.12);
            --text: #7a9ab8;
            --text-bright: #c8dff0;
            --red: #ef4444;
            --yellow: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
        }

        /* The Scanline Overlay you wanted back */
        body::before {
            content: " ";
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 5;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .frame {
            width: 95%;
            max-width: 460px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-top: 3px solid var(--neon);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            z-index: 1;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .label { font-size: 0.65rem; color: var(--neon); font-weight: 600; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 6px; }
        
        .bar-bg { background: rgba(0,0,0,0.6); height: 10px; border-radius: 5px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); overflow: hidden; position: relative; }
        .bar-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 5px; }
        #bar-ap { background: linear-gradient(90deg, #dc2626, #ef4444); box-shadow: 0 0 15px rgba(239,68,68,0.4); }
        #bar-xp { background: linear-gradient(90deg, #b45309, #f59e0b); box-shadow: 0 0 15px rgba(245,158,11,0.4); }

        .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 25px; gap: 5px; }
        .tab { font-size: 0.75rem; color: var(--text); cursor: pointer; text-transform: uppercase; font-weight: 600; letter-spacing: 1.5px; padding: 12px 5px; transition: 0.3s; position: relative; flex: 1; text-align: center; }
        .tab.active { color: var(--neon); text-shadow: var(--neon-glow); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 2px; background: var(--neon); box-shadow: var(--neon-glow); }

        .quest-card {
            background: rgba(0, 242, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border-left: 4px solid var(--neon);
        }
        .quest-card.hard { border-left-color: var(--red); }
        .quest-card.evolution { border-left-color: var(--gm); }
        .quest-title { font-family: 'Cinzel'; font-size: 0.9rem; color: var(--text-bright); margin-bottom: 6px; }
        .quest-desc { font-size: 0.8rem; color: var(--text); line-height: 1.5; margin-bottom: 10px; }
        .quest-rew { font-size: 0.7rem; color: var(--yellow); letter-spacing: 1px; font-weight: 700; text-transform: uppercase; }

        .power-slot {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }
        .power-slot.sealed { border-style: dashed; opacity: 0.4; background: rgba(0,0,0,0.5); filter: grayscale(1); }
        .power-name { font-size: 0.95rem; color: var(--text-bright); font-weight: 600; }
        .power-meta { font-size: 0.65rem; color: var(--neon); text-transform: uppercase; letter-spacing: 1px; }
        .seal-tag { font-size: 0.6rem; color: var(--red); border: 1px solid var(--red); padding: 3px 8px; border-radius: 5px; font-weight: 900; letter-spacing: 1px; }

        input, textarea, select { width: 100%; background: rgba(0,0,0,0.8); border: 1px solid var(--border); padding: 14px; color: white; border-radius: 10px; margin-bottom: 12px; font-family: 'Rajdhani'; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--neon); box-shadow: var(--neon-dim); }

        .btn { width: 100%; background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 16px; font-weight: 700; border-radius: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 3px; font-size: 0.9rem; transition: 0.3s; }
        .btn:active { transform: scale(0.98); background: var(--neon-dim); }
        .btn-gm { border-color: var(--gm); color: var(--gm); }
        
        .hidden { display: none !important; }

        #toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-120px); background: #051622; border: 1px solid var(--neon); padding: 15px 30px; border-radius: 12px; z-index: 1000; transition: 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28); color: var(--neon); font-size: 0.85rem; font-weight: 800; box-shadow: var(--neon-glow); white-space: nowrap; }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast">SYSTEM: <span id="toast-msg"></span></div>

<div class="frame">
    <!-- AUTHENTICATION SCREEN -->
    <div id="auth">
        <h1 style="font-family:'Cinzel'; text-align:center; letter-spacing:8px; color:var(--neon); margin-top:30px; font-size:2.2rem;">AETHERIUM</h1>
        <p style="text-align:center; font-size:0.65rem; letter-spacing:4px; margin-bottom:50px; color:var(--text); font-weight:500;">SYSTEM OS • TOWER REGISTRY</p>
        
        <div style="margin-bottom:30px;">
            <div class="label" style="text-align:center;">Unit Authentication</div>
            <input id="user-id" type="text" placeholder="ID" style="text-align:center;">
            <button class="btn" onclick="sync()">Initialize Link</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dash" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:25px; padding-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.05);">
            <div>
                <div class="label" style="font-size:0.55rem;">Authorized Unit</div>
                <div id="disp-name" style="font-family:'Cinzel'; font-size:1.3rem; color:white; letter-spacing:1px; text-shadow: 0 0 10px rgba(255,255,255,0.2);">---</div>
            </div>
            <div style="text-align:right;">
                <div class="label" style="font-size:0.55rem;">Access status</div>
                <div style="color:#22c55e; font-size:0.7rem; font-weight:bold; letter-spacing:1px;">● ONLINE</div>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" id="t-status" onclick="switchTab('status')">Core</div>
            <div class="tab" id="t-directives" onclick="switchTab('directives')">Directives</div>
            <div class="tab" id="t-powers" onclick="switchTab('powers')">Library</div>
        </div>

        <!-- CORE STATS VIEW -->
        <div id="view-status">
            <div class="label">Action Points <span id="ap-val" style="float:right; font-family:monospace;">-- / --</span></div>
            <div class="bar-bg"><div id="bar-ap" class="bar-fill"></div></div>
            
            <div class="label" style="margin-top:20px;">Soul Resonance (XP) <span id="xp-val" style="float:right; font-family:monospace;">-- / --</span></div>
            <div class="bar-bg"><div id="bar-xp" class="bar-fill"></div></div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:30px;">
                <div style="background:rgba(0,0,0,0.5); padding:20px; border-radius:12px; text-align:center; border:1px solid var(--border);">
                    <div class="label">Evolution Level</div>
                    <div id="disp-lvl" style="font-size:2.2rem; font-family:'Cinzel'; color:var(--neon); font-weight:900;">1</div>
                </div>
                <div style="background:rgba(0,0,0,0.5); padding:20px; border-radius:12px; text-align:center; border:1px solid var(--border);">
                    <div class="label">Aether Coins</div>
                    <div id="disp-coins" style="font-size:2.2rem; font-family:'Cinzel'; color:var(--yellow); font-weight:900;">0</div>
                </div>
            </div>
            
            <button onclick="location.reload()" class="btn" style="margin-top:30px; border-color:rgba(239, 68, 68, 0.3); color:rgba(239, 68, 68, 0.6); font-size:0.7rem; padding:10px;">Terminate Link</button>
        </div>

        <!-- DIRECTIVES VIEW -->
        <div id="view-directives" class="hidden">
            <div id="quest-list"></div>
        </div>

        <!-- LIBRARY VIEW -->
        <div id="view-powers" class="hidden">
            <div id="powers-container"></div>
        </div>
    </div>

    <!-- GM TERMINAL OVERLAY -->
    <div id="gm" class="hidden" style="position:fixed; inset:0; background:var(--bg); z-index:2000; padding:30px; overflow-y:auto;">
        <h2 style="font-family:'Cinzel'; color:var(--gm); margin-bottom:30px; letter-spacing:4px; border-bottom:2px solid var(--gm); padding-bottom:10px;">SYSTEM ARCHITECT</h2>
        
        <div style="background:rgba(168, 85, 247, 0.05); border:1px solid rgba(168, 85, 247, 0.2); padding:20px; border-radius:12px; margin-bottom:20px;">
            <div class="label" style="color:var(--gm);">Deploy New Directive</div>
            <input id="q-title" placeholder="Quest Designation">
            <textarea id="q-desc" placeholder="Operational Details" style="height:100px;"></textarea>
            <input id="q-rew" placeholder="Rewards (e.g. 500XP, 200C)">
            <select id="q-diff">
                <option value="normal">Rank: NORMAL</option>
                <option value="hard">Rank: HARD</option>
                <option value="evolution">Rank: EVOLUTION</option>
            </select>
            <button class="btn btn-gm" onclick="addQuest()">Broadcast Directive</button>
        </div>

        <div style="background:rgba(168, 85, 247, 0.05); border:1px solid rgba(168, 85, 247, 0.2); padding:20px; border-radius:12px;">
            <div class="label" style="color:var(--gm);">Inject Resources</div>
            <input id="rew-id" placeholder="Unit Identifier">
            <input id="rew-xp" type="number" placeholder="Add XP Amount">
            <input id="rew-coins" type="number" placeholder="Add Coin Amount">
            <button class="btn btn-gm" onclick="dispenseRewards()">Confirm Injection</button>
        </div>

        <button class="btn" style="margin-top:30px; border-color:#334155; color:#334155;" onclick="document.getElementById('gm').classList.add('hidden')">Close Terminal</button>
    </div>

    <div style="text-align:center; margin-top:40px; font-size:0.55rem; color:#1e293b; letter-spacing:2px; cursor:pointer;" onclick="enterGM()">[ LOGIN_ROOT_AUTHORITY ]</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDzoLb_qVYgsWAmIdPtdkSJSnXX-IyeQC0",
        databaseURL: "https://aetheriumsystem-f9a6c-default-rtdb.firebaseio.com",
        projectId: "aetheriumsystem-f9a6c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentID = "";

    function toast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toast-msg').innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3500);
    }

    function sync() {
        const id = document.getElementById('user-id').value.trim().toLowerCase();
        if (!id) return;
        currentID = id;

        toast("ESTABLISHING NEURAL LINK...");

        db.ref('players/' + id).once('value').then(snap => {
            if (snap.exists()) {
                // FIXED UI SWAP LOGIC
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('auth').style.display = 'none';
                document.getElementById('dash').classList.remove('hidden');
                document.getElementById('dash').style.display = 'block';
                
                updateUI(snap.val());
                toast("SYSTEM ONLINE: Unit " + id.toUpperCase() + " has successfully linked.");
            } else {
                db.ref('players/' + id).set({
                    lvl: 1, exp: 0, coins: 0, ap: 100, maxAp: 100,
                    powers: [
                        { name: "Empty Slot", stage: "Basic", sealed: false },
                        { name: "Empty Slot", stage: "Basic", sealed: false },
                        { name: "Third Seal", stage: "Sealed", sealed: true },
                        { name: "Fourth Seal", stage: "Sealed", sealed: true }
                    ]
                }).then(() => location.reload());
            }
        });

        db.ref('players/' + id).on('value', snap => { if (snap.exists()) updateUI(snap.val()); });
        
        db.ref('worldData/quests').on('value', snap => {
            const container = document.getElementById('quest-list');
            container.innerHTML = '';
            snap.forEach(q => {
                const d = q.val();
                container.innerHTML += `
                    <div class="quest-card ${d.diff}">
                        <div class="quest-title">${d.title}</div>
                        <div class="quest-desc">${d.desc}</div>
                        <div class="quest-rew">REWARD: ${d.reward}</div>
                        <button onclick="deleteQuest('${q.key}')" style="background:none; border:none; color:rgba(255,255,255,0.2); font-size:0.5rem; cursor:pointer; margin-top:10px;">[DELETE DIRECTIVE]</button>
                    </div>`;
            });
        });
    }

    function updateUI(data) {
        try {
            document.getElementById('disp-name').innerText = currentID.toUpperCase();
            document.getElementById('disp-lvl').innerText = data.lvl;
            document.getElementById('disp-coins').innerText = data.coins;
            
            const ap = data.ap || 0;
            const maxAp = data.maxAp || 100;
            document.getElementById('bar-ap').style.width = (ap / maxAp * 100) + "%";
            document.getElementById('ap-val').innerText = ap + " / " + maxAp;

            const req = Math.floor(100 * Math.pow(1.2, (data.lvl || 1) - 1));
            const exp = data.exp || 0;
            document.getElementById('bar-xp').style.width = (exp / req * 100) + "%";
            document.getElementById('xp-val').innerText = Math.floor(exp) + " / " + req;

            const pContainer = document.getElementById('powers-container');
            pContainer.innerHTML = '';
            data.powers.forEach(p => {
                pContainer.innerHTML += `
                    <div class="power-slot ${p.sealed ? 'sealed' : ''}">
                        <div>
                            <div class="power-meta">${p.stage}</div>
                            <div class="power-name">${p.name}</div>
                        </div>
                        ${p.sealed ? '<div class="seal-tag">SEALED</div>' : ''}
                    </div>`;
            });
        } catch (e) {}
    }

    function addQuest() {
        const title = document.getElementById('q-title').value;
        const desc = document.getElementById('q-desc').value;
        const reward = document.getElementById('q-rew').value;
        const diff = document.getElementById('q-diff').value;
        if (title) db.ref('worldData/quests').push({ title, desc, reward, diff });
    }

    function deleteQuest(key) { db.ref('worldData/quests/' + key).remove(); }

    function dispenseRewards() {
        const id = document.getElementById('rew-id').value.toLowerCase();
        const xp = parseInt(document.getElementById('rew-xp').value) || 0;
        const coins = parseInt(document.getElementById('rew-coins').value) || 0;
        db.ref('players/' + id).transaction(p => {
            if (p) {
                p.exp += xp; p.coins += coins;
                let req = Math.floor(100 * Math.pow(1.2, p.lvl - 1));
                while (p.exp >= req) { p.exp -= req; p.lvl++; req = Math.floor(100 * Math.pow(1.2, p.lvl - 1)); }
            }
            return p;
        });
        toast("RESOURCES INJECTED SUCCESSFULLY");
    }

    function switchTab(tab) {
        ['status', 'directives', 'powers'].forEach(t => {
            document.getElementById('view-' + t).classList.toggle('hidden', t !== tab);
            document.getElementById('t-' + t).classList.toggle('active', t === tab);
        });
    }

    function enterGM() { if (prompt("ENTER ROOT KEY:") === "1234") document.getElementById('gm').classList.remove('hidden'); }
</script>
</body>
</html>

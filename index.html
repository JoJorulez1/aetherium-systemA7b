<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetherium | System OS</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        :root { --neon: #00f2ff; --gm: #a855f7; --bg: #020617; --panel: #0a121e; --text: #94a3b8; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; display: flex; justify-content: center; min-height: 100vh; padding: 15px 0; }
        .frame { width: 95%; max-width: 450px; background: var(--panel); border: 1px solid rgba(0, 242, 255, 0.2); border-top: 4px solid var(--neon); border-radius: 12px; padding: 20px; position: relative; }
        .label { font-size: 0.6rem; color: var(--neon); font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; display: block; margin-bottom: 4px; }
        .bar-bg { background: #000; height: 10px; border-radius: 5px; margin-bottom: 12px; border: 1px solid #1e293b; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.8s ease; }
        .tabs { display: flex; gap: 15px; border-bottom: 1px solid #1e293b; margin-bottom: 15px; padding-bottom: 8px; }
        .tab { font-size: 0.7rem; color: #475569; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .tab.active { color: var(--neon); border-bottom: 2px solid var(--neon); }
        .archive-scroll { height: 300px; overflow-y: auto; }
        .lore-entry { background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.1); padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid var(--neon); }
        .lore-text { font-size: 0.85rem; color: var(--text); line-height: 1.5; }
        .lore-meta { font-size: 0.6rem; color: var(--neon); opacity: 0.6; margin-bottom: 5px; }
        .ai-terminal { background: #000; border: 1px solid var(--gm); border-radius: 8px; padding: 12px; height: 200px; overflow-y: auto; font-size: 0.85rem; color: #d8b4fe; margin-bottom: 10px; }
        .gm-msg { color: #fff; text-align: right; margin-bottom: 10px; font-style: italic; }
        .ai-msg { margin-bottom: 15px; border-left: 2px solid var(--gm); padding-left: 10px; }
        input, textarea { width: 100%; background: #000; border: 1px solid #1e293b; padding: 12px; color: white; border-radius: 8px; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .btn-gm { background: var(--gm); color: white; }
        .hidden { display: none; }
        .gm-key { position: absolute; top: 10px; right: 15px; font-size: 10px; color: #1e293b; cursor: pointer; }
    </style>
</head>
<body>

<div class="frame">
    <div class="gm-key" onclick="enterGM()">[GM_ROOT]</div>

    <div id="auth">
        <h1 style="text-align:center; color:var(--neon); letter-spacing:5px; margin: 40px 0;">AETHERIUM</h1>
        <p style="text-align:center; font-size:0.7rem; color:var(--text); margin-bottom:15px;">Enter your name to link with the system.</p>
        <input id="user-id" type="text" placeholder="WELCOME TO AETHERIUM" style="text-align:center;">
        <button class="btn" onclick="sync()">Initialize Link</button>
    </div>

    <div id="dash" class="hidden">
        <div class="tabs">
            <div id="t-status" class="tab active" onclick="switchTab('status')">Status</div>
            <div id="t-lore" class="tab" onclick="switchTab('lore')">Lore Archive</div>
        </div>

        <div id="view-status">
            <h2 id="disp-name" style="margin-bottom:15px; font-size:1.2rem;">UNIT: NULL</h2>
            <span class="label">AP (Action Points)</span>
            <div class="bar-bg"><div id="bar-ap" class="bar-fill" style="background:#ef4444;"></div></div>
            <span class="label">XP (Experience)</span>
            <div class="bar-bg"><div id="bar-xp" class="bar-fill" style="background:#eab308;"></div></div>
            <div style="display:flex; justify-content:space-between; margin: 20px 0; background:rgba(255,255,255,0.02); padding:10px; border-radius:8px;">
                <div><span class="label">A-Coins</span><p id="disp-coins" style="font-weight:bold; font-size:1.1rem;">0</p></div>
                <div style="text-align:right;"><span class="label">Level</span><p id="disp-lvl" style="font-weight:bold; font-size:1.1rem;">1</p></div>
            </div>
            <span class="label">Inventory & Skills</span>
            <div id="disp-inv" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:5px;"></div>
        </div>

        <div id="view-lore" class="hidden">
            <div class="archive-scroll" id="archive-list"></div>
        </div>
    </div>

    <div id="gm" class="hidden">
        <h2 style="color:var(--gm); margin-bottom:15px;">GM WORKSHOP</h2>
        <input id="gemini-key" type="password" placeholder="Enter Gemini API Key" style="border: 1px solid var(--gm); font-size: 0.8rem;">
        <div class="ai-terminal" id="ai-convo">
            <div class="ai-msg">System Architect: Memory nodes active.</div>
        </div>
        <textarea id="gm-input" placeholder="Paste messy chat or discuss quest..."></textarea>
        <button class="btn btn-gm" onclick="aiAction()">Consult System Architect</button>
        <div style="margin-top:20px; padding-top:15px; border-top:1px solid #1e293b;">
            <p class="label" style="color:var(--gm)">Balance Dispenser</p>
            <input id="rew-id" placeholder="Player ID">
            <div style="display:flex; gap:5px;">
                <input id="rew-c" placeholder="+Coins" style="width:50%;">
                <input id="rew-x" placeholder="+XP" style="width:50%;">
            </div>
            <button class="btn btn-gm" style="margin-top:10px;" onclick="dispense()">Update Database</button>
        </div>
        <button class="btn" style="background:transparent; color:gray; font-size:10px; margin-top:15px;" onclick="closeGM()">Exit Terminal</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDzoLb_qVYgsWAmIdPtdkSJSnXX-IyeQC0", 
        databaseURL: "https://aetheriumsystem-f9a6c-default-rtdb.firebaseio.com",
        projectId: "aetheriumsystem-f9a6c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentID = "";
    let pendingLoreDraft = ""; 

    function sync() {
        const id = document.getElementById('user-id').value.trim();
        if(!id) return;
        const playerRef = db.ref('players/' + id);
        playerRef.once('value', snap => {
            if(snap.exists()) {
                currentID = id;
                startListener(id);
            } else {
                const newPlayerData = { lvl: 1, exp: 0, coins: 0, ap: 100, inventory: ["", "", "", "", "", "", "", ""] };
                playerRef.set(newPlayerData).then(() => {
                    currentID = id;
                    startListener(id);
                    alert("Unit " + id + " Linked.");
                });
            }
        });
        db.ref('worldData/lore').on('value', snap => {
            const list = document.getElementById('archive-list');
            list.innerHTML = '';
            snap.forEach(entry => {
                const data = entry.val();
                list.innerHTML += `<div class="lore-entry"><div class="lore-meta">${data.date}</div><div class="lore-text">${data.text}</div></div>`;
            });
        });
    }

    function startListener(id) {
        db.ref('players/' + id).on('value', snap => {
            updateUI(snap.val());
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('dash').classList.remove('hidden');
        });
    }

    function updateUI(data) {
        document.getElementById('disp-name').innerText = "UNIT: " + currentID;
        document.getElementById('disp-lvl').innerText = data.lvl;
        document.getElementById('disp-coins').innerText = data.coins;
        document.getElementById('bar-ap').style.width = (data.ap || 100) + "%";
        const req = Math.floor(100 * Math.pow(1.5, data.lvl - 1));
        document.getElementById('bar-xp').style.width = (data.exp / req * 100) + "%";
        const inv = document.getElementById('disp-inv');
        inv.innerHTML = '';
        (data.inventory || ["", "", "", "", "", "", "", ""]).forEach(item => {
            inv.innerHTML += `<div style="aspect-ratio:1; background:#000; border:1px solid #1e293b; border-radius:4px; display:flex; align-items:center; justify-content:center;">${item}</div>`;
        });
    }

    async function aiAction() {
        const apiKey = document.getElementById('gemini-key').value; 
        const input = document.getElementById('gm-input').value;
        const chat = document.getElementById('ai-convo');
        if(!apiKey) { alert("Key Required."); return; }
        if(!input) return;
        chat.innerHTML += `<div class="gm-msg">> ${input}</div>`;
        const prompt = `Aetherium System: Analyze GM input, summarize lore, calculate XP (100*1.5^(lvl-1)) and coins. Input: ${input}`;
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            pendingLoreDraft = aiText; 
            chat.innerHTML += `<div class="ai-msg">${aiText}<br><br><button class="btn btn-gm" style="padding:8px; font-size:10px; width:auto;" onclick="finalizeQuest()">Push to Lore</button></div>`;
        } catch (e) { chat.innerHTML += `<div class="ai-msg" style="color:red;">Link Failed.</div>`; }
        document.getElementById('gm-input').value = '';
        chat.scrollTop = chat.scrollHeight;
    }

    function finalizeQuest() {
        if(!pendingLoreDraft) return;
        db.ref('worldData/lore').push({ text: pendingLoreDraft, date: new Date().toLocaleDateString() });
        alert("Lore Synced.");
        pendingLoreDraft = "";
    }

    function dispense() {
        const id = document.getElementById('rew-id').value;
        const c = parseInt(document.getElementById('rew-c').value) || 0;
        const x = parseInt(document.getElementById('rew-x').value) || 0;
        db.ref('players/' + id).transaction(p => {
            if(p) {
                p.coins += c; p.exp += x;
                let req = Math.floor(100 * Math.pow(1.5, p.lvl - 1));
                while(p.exp >= req) { p.exp -= req; p.lvl++; req = Math.floor(100 * Math.pow(1.5, p.lvl - 1)); }
            } return p;
        });
    }

    function switchTab(tab) {
        document.getElementById('view-status').classList.toggle('hidden', tab !== 'status');
        document.getElementById('view-lore').classList.toggle('hidden', tab !== 'lore');
        document.getElementById('t-status').classList.toggle('active', tab === 'status');
        document.getElementById('t-lore').classList.toggle('active', tab === 'lore');
    }

    function enterGM() { if(prompt("ACCESS:") === "1234") document.getElementById('gm').classList.remove('hidden'); }
    function closeGM() { document.getElementById('gm').classList.add('hidden'); }
</script>
</body>
</html>
